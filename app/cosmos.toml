VERSION = "0.1"
NETWORK = "cosmos"
PROJECT_NAME = "Cosmos DEX Terminal"
PROJECT_URL = "https://cosmdex.com"
DESCRIPTION = "Wallet-first Cosmos trading terminal with domain-hosted metadata and trust overlays."
ICON = "https://cosmdex.com/assets/icon.png"
DEFAULT_LANGUAGE = "en"
LAST_UPDATED = "2026-04-06T00:00:00Z"

[ORG]
