AUDIT_URLS = [
  "https://cosmdex.com/audits/example-audit-1.pdf"
]
ATTESTATION = "This domain publishes the official metadata for Cosmos DEX Terminal assets and services."

[[CHAINS]]
CHAIN_ID = "cosmoshub-4"
CHAIN_NAME = "Cosmos Hub"
ADDRESS_PREFIX = "cosmos"
